<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>webgen — professional websites from your brief</title>
<style>
  :root {
    --ink:#1d1d1f; --body:#6e6e73; --muted:#86868b;
    --bg:#ffffff; --bg-alt:#f5f5f7; --line:#d2d2d7;
    --dark:#0a0a0b; --dark-2:#141417; --on-dark:#f5f5f7; --on-dark-mut:#a1a1a6;
    --accent:#0071e3; --accent-dark:#0077ed;
    --radius:18px; --radius-lg:28px;
    --shadow:0 4px 30px rgba(0,0,0,.08);
    --maxw:980px;
  }
  * { box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { margin:0; color:var(--ink); background:var(--bg); letter-spacing:-.01em;
         font:17px/1.47 "SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         -webkit-font-smoothing:antialiased; overflow-x:hidden; }
  h1,h2,h3 { color:inherit; line-height:1.06; letter-spacing:-.03em; font-weight:600; margin:0; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  .wrap { max-width:var(--maxw); margin:0 auto; padding:0 22px; }

  /* top bar — thin, frosted */
  .topbar { background:rgba(255,255,255,.72); backdrop-filter:saturate(180%) blur(20px);
            border-bottom:1px solid rgba(0,0,0,.07); position:fixed; top:0; left:0; right:0; z-index:50; }
  .topbar .wrap { display:flex; align-items:center; justify-content:space-between; height:48px; }
  .logo { display:flex; align-items:center; gap:9px; font-weight:600; color:var(--ink);
          font-size:18px; letter-spacing:-.02em; cursor:pointer; }
  .logo .mark { width:24px; height:24px; border-radius:7px;
                background:linear-gradient(135deg,#0071e3,#42a5ff); }
  .topnav { display:flex; align-items:center; gap:16px; }
  .langbox { font-size:13px; color:var(--muted); display:flex; align-items:center; gap:7px; }
  .langbox select { font:inherit; padding:5px 8px; border:1px solid var(--line);
                    border-radius:8px; background:rgba(255,255,255,.6); color:var(--ink); cursor:pointer; }
  .nav-cta { font-size:14px; font-weight:500; color:#fff; background:var(--accent);
             border:none; border-radius:980px; padding:7px 16px; cursor:pointer; }
  .nav-cta:hover { background:var(--accent-dark); }

  /* buttons */
  .btn { background:var(--accent); color:#fff; border:none; border-radius:980px;
         padding:12px 26px; font:inherit; font-size:17px; font-weight:400; cursor:pointer;
         transition:background .2s, transform .08s; }
  .btn:hover { background:var(--accent-dark); }
  .btn:active { transform:scale(.98); }
  .btn:disabled { opacity:.5; cursor:default; }
  .btn.big { padding:15px 34px; font-size:19px; }
  .btn.ghost { background:transparent; color:var(--accent); padding:12px 8px; }
  .btn.ghost:hover { background:transparent; text-decoration:underline; }
  .linkarrow { color:var(--accent); font-size:18px; cursor:pointer; background:none; border:none;
               font:inherit; padding:0; }
  .linkarrow:hover { text-decoration:underline; }

  /* ===== LANDING ===== */
  .lp section { position:relative; }

  /* hero */
  .lp-hero { position:relative; min-height:100vh; display:flex; flex-direction:column;
             align-items:center; justify-content:center; text-align:center;
             padding:104px 22px 140px; overflow:hidden; background:#ffffff; }
  .lp-hero .hero-inner { position:relative; z-index:2; }
  .lp-hero h1 { font-size:clamp(36px,6.2vw,80px); max-width:16ch; letter-spacing:-.035em; line-height:1.04; }
  .lp-hero .lead { color:var(--body); font-size:clamp(19px,2.5vw,27px); font-weight:400;
                   max-width:32ch; margin:22px auto 0; line-height:1.25; letter-spacing:-.015em; }
  .lp-hero .cta-row { display:flex; gap:26px; align-items:center; justify-content:center;
                      flex-wrap:wrap; margin-top:38px; }

  /* hero background — drifting gradient orbs + faint dot grid */
  .lp-hero .bg { position:absolute; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .lp-hero .bg::after { content:""; position:absolute; inset:0;
        background-image:radial-gradient(rgba(20,30,60,.06) 1px, transparent 1.4px); background-size:30px 30px;
        -webkit-mask-image:radial-gradient(circle at 50% 38%, #000 0%, transparent 68%);
        mask-image:radial-gradient(circle at 50% 38%, #000 0%, transparent 68%); }
  .orb { position:absolute; border-radius:50%; filter:blur(72px); opacity:.5; will-change:transform; }
  .orb.a { width:560px; height:560px; top:-160px; left:-120px;
           background:radial-gradient(circle at 30% 30%, #8fb8ff, transparent 70%); animation:drift1 19s ease-in-out infinite; }
  .orb.b { width:520px; height:520px; top:-30px; right:-150px;
           background:radial-gradient(circle at 60% 40%, #c9b3ff, transparent 70%); animation:drift2 23s ease-in-out infinite; }
  .orb.c { width:600px; height:600px; bottom:-240px; left:34%;
           background:radial-gradient(circle at 50% 50%, #93e6ff, transparent 70%); animation:drift3 27s ease-in-out infinite; }
  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(42px,32px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-52px,40px)} }
  @keyframes drift3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-44px)} }

  /* scroll cue — animated mouse + label, clickable */
  .scroll-cue { position:absolute; bottom:26px; left:50%; transform:translateX(-50%); z-index:2;
                display:flex; flex-direction:column; align-items:center; gap:9px; cursor:pointer;
                background:none; border:none; padding:6px; }
  .scroll-cue .mouse { width:26px; height:42px; border:2px solid var(--muted); border-radius:14px;
                       position:relative; opacity:.85; transition:border-color .2s; }
  .scroll-cue .mouse::after { content:""; position:absolute; top:7px; left:50%; width:4px; height:8px;
        border-radius:3px; background:var(--muted); transform:translateX(-50%);
        animation:wheel 1.7s cubic-bezier(.45,0,.2,1) infinite; }
  .scroll-cue .label { font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted);
                       transition:color .2s; }
  .scroll-cue:hover .mouse { border-color:var(--accent); }
  .scroll-cue:hover .label { color:var(--accent); }
  @keyframes wheel { 0%{opacity:0;transform:translate(-50%,0)} 25%{opacity:1}
                     75%{opacity:1;transform:translate(-50%,13px)} 100%{opacity:0;transform:translate(-50%,15px)} }

  /* stats (dark) */
  .lp-stats { position:relative; overflow:hidden; background:var(--dark); color:var(--on-dark); padding:120px 22px; }
  .lp-stats::before { content:""; position:absolute; inset:0; z-index:0;
        background:radial-gradient(640px 320px at 18% 0%, rgba(0,113,227,.30), transparent 62%),
                   radial-gradient(560px 320px at 92% 112%, rgba(124,58,237,.26), transparent 60%); }
  .stats-grid { position:relative; z-index:1; max-width:1080px; margin:0 auto;
                display:grid; grid-template-columns:repeat(4,1fr); gap:30px; }
  .stat { text-align:center; }
  .stat .n { font-size:clamp(40px,5.5vw,68px); font-weight:600; letter-spacing:-.03em;
             background:linear-gradient(180deg,#fff,#9bbcff); -webkit-background-clip:text;
             background-clip:text; -webkit-text-fill-color:transparent; }
  .stat .l { color:var(--on-dark-mut); font-size:16px; margin-top:8px; }

  /* showcase (dark, vertical stack) */
  .lp-showcase { position:relative; overflow:hidden; background:var(--dark-2); color:var(--on-dark); }
  .lp-showcase::before { content:""; position:absolute; top:-80px; left:50%; transform:translateX(-50%);
        width:900px; height:520px; z-index:0;
        background:radial-gradient(circle, rgba(0,194,255,.20), transparent 65%); }
  .showcase-head { position:relative; z-index:1; text-align:center; padding:110px 22px 0; }
  .showcase-head h2 { font-size:clamp(30px,4.5vw,52px); letter-spacing:-.03em; }
  .showcase-view { position:relative; z-index:1; padding:48px 22px 110px; }
  .showcase-track { display:flex; flex-direction:column; gap:22px; max-width:680px; margin:0 auto; }
  .sc-card { border-radius:var(--radius-lg); padding:40px 40px 44px; color:#fff;
             box-shadow:0 20px 60px rgba(0,0,0,.4); }
  .sc-card:nth-child(1){ background:linear-gradient(150deg,#0071e3,#00c2ff); }
  .sc-card:nth-child(2){ background:linear-gradient(150deg,#7c3aed,#db2777); }
  .sc-card:nth-child(3){ background:linear-gradient(150deg,#059669,#34d399); }
  .sc-card:nth-child(4){ background:linear-gradient(150deg,#ea580c,#f59e0b); }
  .sc-card h3 { font-size:28px; letter-spacing:-.02em; }
  .sc-card p { font-size:17px; margin:10px 0 0; opacity:.92; }

  /* closing cta (light) */
  .lp-cta { position:relative; overflow:hidden; background:var(--bg); padding:140px 22px 150px; text-align:center; }
  .lp-cta::before { content:""; position:absolute; inset:0; z-index:0;
        background:radial-gradient(720px 420px at 50% 28%, #e9f1ff, transparent 66%); }
  .lp-cta > * { position:relative; z-index:1; }
  .lp-cta h2 { font-size:clamp(34px,5.5vw,68px); letter-spacing:-.04em; max-width:16ch; margin:0 auto; }
  .lp-cta p { color:var(--body); font-size:clamp(18px,2.2vw,24px); max-width:40ch; margin:22px auto 38px; }

  /* ===== FUNNEL (brief / contact / done) ===== */
  .stepper { display:flex; align-items:center; justify-content:center; gap:10px;
             margin:84px auto 6px; flex-wrap:wrap; }
  .stepper.hidden { display:none; }
  .stepper .s { display:flex; align-items:center; gap:9px; color:var(--muted); font-size:14px; font-weight:500; }
  .stepper .n { width:27px; height:27px; border-radius:50%; border:1.5px solid var(--line);
                display:grid; place-items:center; font-size:13px; background:#fff; transition:all .2s; }
  .stepper .s.active { color:var(--ink); }
  .stepper .s.active .n { border-color:var(--accent); color:var(--accent); }
  .stepper .s.done .n { background:var(--accent); border-color:var(--accent); color:#fff; }
  .stepper .bar { width:40px; height:2px; background:var(--line); }

  .funnel { padding:0 22px 88px; }
  .card { background:#fff; border-radius:var(--radius-lg); padding:44px 46px; margin:28px auto 0;
          max-width:660px; box-shadow:var(--shadow); }
  .card > h2 { font-size:28px; }
  .card > .sub { color:var(--body); margin-top:8px; font-size:17px; }
  label { display:block; font-weight:500; color:var(--ink); margin:26px 0 8px; font-size:15px; }
  .hint { font-weight:400; color:var(--muted); font-size:13px; }
  input[type=text], input[type=email], input[type=tel], select, textarea {
    width:100%; padding:13px 16px; border:1px solid var(--line); border-radius:12px;
    font:inherit; font-size:17px; background:#fff; color:var(--ink);
    transition:border-color .15s, box-shadow .15s; }
  input:focus, select:focus, textarea:focus { outline:none;
    border-color:var(--accent); box-shadow:0 0 0 4px rgba(0,113,227,.15); }
  input[type=color] { width:56px; height:44px; padding:3px; border:1px solid var(--line);
    border-radius:11px; background:#fff; cursor:pointer; }
  textarea { resize:vertical; min-height:96px; }
  .chips { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
  .chip { padding:9px 17px; border:1px solid var(--line); border-radius:980px; cursor:pointer;
          user-select:none; background:#fff; font-size:15px; transition:all .15s; }
  .chip:hover { border-color:var(--muted); }
  .chip.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .actions { display:flex; gap:14px; margin-top:34px; align-items:center; }
  .spacer { flex:1; }
  .err { color:#d70015; margin-top:16px; font-size:15px; }
  .done-card { text-align:center; }
  .done-card .check { width:72px; height:72px; border-radius:50%; margin:6px auto 22px;
                      background:linear-gradient(135deg,#0071e3,#42a5ff); display:grid; place-items:center; }
  .done-card .check::after { content:""; width:20px; height:34px; border:solid #fff;
                      border-width:0 4px 4px 0; transform:rotate(45deg); margin-top:-8px; }

  footer.app { text-align:center; color:var(--muted); font-size:13px; padding:30px 22px;
               background:var(--bg-alt); border-top:1px solid var(--line); }

  .step { display:none; }
  .step.on { display:block; }
  @media (max-width:760px) {
    .stats-grid { grid-template-columns:repeat(2,1fr); gap:40px 20px; }
    .card { padding:32px 24px; }
  }
  @media (prefers-reduced-motion:reduce){ html{scroll-behavior:auto;} .scroll-cue::after{animation:none;} }
</style>
</head>
<body>
<div class="topbar"><div class="wrap">
  <div class="logo" id="logo"><span class="mark"></span>webgen</div>
  <div class="topnav">
    <div class="langbox"><span id="lang-label"></span><select id="lang"></select></div>
    <button class="nav-cta" id="nav-cta"></button>
  </div>
</div></div>

<div class="stepper hidden" id="stepper">
  <div class="s" data-step="1"><span class="n">1</span><span id="step-brief"></span></div>
  <div class="bar"></div>
  <div class="s" data-step="2"><span class="n">2</span><span id="step-contact"></span></div>
  <div class="bar"></div>
  <div class="s" data-step="3"><span class="n">3</span><span id="step-done"></span></div>
</div>

<!-- ===================== LANDING (home) ===================== -->
<div id="home-step" class="step on lp">
  <!-- Hero -->
  <section class="lp-hero">
    <div class="bg" aria-hidden="true">
      <span class="orb a"></span><span class="orb b"></span><span class="orb c"></span>
    </div>
    <div class="hero-inner">
      <h1 id="hero-title"></h1>
      <p class="lead" id="app-sub"></p>
      <div class="cta-row">
        <button class="btn big" id="home-cta"></button>
        <button class="linkarrow" id="see-how"></button>
      </div>
    </div>
    <button class="scroll-cue" id="scroll-cue-btn" aria-label="Scroll down">
      <span class="mouse"></span>
      <span class="label" id="scroll-cue"></span>
    </button>
  </section>

  <!-- Stats (dark) -->
  <section class="lp-stats" id="stats">
    <div class="stats-grid">
      <div class="stat"><div class="n" id="stat-1-n"></div><div class="l" id="stat-1-l"></div></div>
      <div class="stat"><div class="n" id="stat-2-n"></div><div class="l" id="stat-2-l"></div></div>
      <div class="stat"><div class="n" id="stat-3-n"></div><div class="l" id="stat-3-l"></div></div>
      <div class="stat"><div class="n" id="stat-4-n"></div><div class="l" id="stat-4-l"></div></div>
    </div>
  </section>

  <!-- Showcase (horizontal) -->
  <section class="lp-showcase">
    <div class="showcase-head"><h2 id="show-title"></h2></div>
    <div class="showcase-view">
      <div class="showcase-track">
        <div class="sc-card"><h3 id="show-1-t"></h3><p id="show-1-d"></p></div>
        <div class="sc-card"><h3 id="show-2-t"></h3><p id="show-2-d"></p></div>
        <div class="sc-card"><h3 id="show-3-t"></h3><p id="show-3-d"></p></div>
        <div class="sc-card"><h3 id="show-4-t"></h3><p id="show-4-d"></p></div>
      </div>
    </div>
  </section>

  <!-- Closing CTA -->
  <section class="lp-cta">
    <h2 id="cta-title"></h2>
    <p id="cta-sub"></p>
    <button class="btn big" id="home-cta-2"></button>
  </section>
</div>

<!-- ===================== FUNNEL ===================== -->
<main class="funnel">
  <section id="form-step" class="step">
    <div class="card">
      <h2 id="form-title"></h2>
      <div class="sub" id="form-sub"></div>
      <form id="brief-form"></form>
      <div class="err" id="form-err"></div>
      <div class="actions">
        <button class="btn ghost" id="brief-back"></button>
        <span class="spacer"></span>
        <button class="btn" id="to-contact"></button>
      </div>
    </div>
  </section>

  <section id="contact-step" class="step">
    <div class="card">
      <h2 id="contact-title"></h2>
      <div class="sub" id="contact-sub"></div>
      <form id="contact-form">
        <label id="l-cname"></label>
        <input type="text" id="c_name" autocomplete="name">
        <label id="l-cemail"></label>
        <input type="email" id="c_email" autocomplete="email">
        <label id="l-cphone"></label>
        <input type="tel" id="c_phone" autocomplete="tel">
        <label id="l-cmsg"></label>
        <textarea id="c_message"></textarea>
      </form>
      <div class="err" id="contact-err"></div>
      <div class="actions">
        <button class="btn ghost" id="contact-back"></button>
        <span class="spacer"></span>
        <button class="btn" id="submit"></button>
      </div>
    </div>
  </section>

  <section id="done-step" class="step">
    <div class="card done-card">
      <div class="check"></div>
      <h2 id="thanks-title"></h2>
      <div class="sub" id="thanks-sub"></div>
      <div class="actions" style="justify-content:center;">
        <button class="btn ghost" id="restart"></button>
      </div>
    </div>
  </section>
</main>

<footer class="app" id="app-footer"></footer>

<!-- GSAP + ScrollTrigger + Lenis (CDN; landing degrades gracefully if absent) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script>
const $ = (s) => document.querySelector(s);
let SCHEMA = [], UI = {}, LANG = 'en';
const multi = {};
let curStep = 'home';
let lenis = null, scrollReady = false;

const STEP_NO = { home: 0, brief: 1, contact: 2, done: 3 };

function show(name) {
  curStep = name;
  document.querySelectorAll('.step').forEach(e => e.classList.remove('on'));
  $('#' + name + '-step').classList.add('on');
  const n = STEP_NO[name];
  $('#stepper').classList.toggle('hidden', n === 0);
  document.querySelectorAll('.stepper .s').forEach(s => {
    const step = +s.dataset.step;
    s.classList.toggle('active', step === n);
    s.classList.toggle('done', step < n || name === 'done');
  });
  scrollTop();
  // Landing has pinned ScrollTriggers; recompute when it re-enters the layout.
  if (window.ScrollTrigger) requestAnimationFrame(() => ScrollTrigger.refresh());
}

function scrollTop() {
  if (lenis) lenis.scrollTo(0, { immediate: true });
  window.scrollTo(0, 0);
}

function applyUI() {
  document.documentElement.lang = LANG;
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  // landing — hero
  set('hero-title', UI.hero_title); set('app-sub', UI.app_sub);
  set('home-cta', UI.home_cta); set('home-cta-2', UI.home_cta);
  set('see-how', UI.see_how); set('scroll-cue', UI.scroll_cue);
  set('nav-cta', UI.nav_start);
  // stats
  for (let i = 1; i <= 4; i++) { set('stat-'+i+'-n', UI['stat_'+i+'_n']); set('stat-'+i+'-l', UI['stat_'+i+'_l']); }
  // showcase
  set('show-title', UI.show_title);
  for (let i = 1; i <= 4; i++) { set('show-'+i+'-t', UI['show_'+i+'_t']); set('show-'+i+'-d', UI['show_'+i+'_d']); }
  // cta
  set('cta-title', UI.cta_title); set('cta-sub', UI.cta_sub);
  // stepper
  set('step-brief', UI.step_brief); set('step-contact', UI.step_contact); set('step-done', UI.step_done);
  // brief
  set('form-title', UI.form_title); set('form-sub', UI.form_sub);
  set('brief-back', UI.back_btn); set('to-contact', UI.continue_btn);
  // contact
  set('contact-title', UI.contact_title); set('contact-sub', UI.contact_sub);
  set('l-cname', UI.contact_name); set('l-cemail', UI.contact_email);
  $('#l-cphone').innerHTML = UI.contact_phone + ` <span class="hint">(${UI.optional})</span>`;
  $('#l-cmsg').innerHTML = UI.contact_message + ` <span class="hint">(${UI.optional})</span>`;
  $('#c_name').placeholder = UI.contact_name_ph; $('#c_email').placeholder = UI.contact_email_ph;
  $('#c_phone').placeholder = UI.contact_phone_ph; $('#c_message').placeholder = UI.contact_message_ph;
  set('contact-back', UI.back_btn); set('submit', UI.submit_btn);
  // thanks + chrome
  set('thanks-title', UI.thanks_title); set('thanks-sub', UI.thanks_sub); set('restart', UI.thanks_back);
  set('lang-label', UI.lang_label); set('app-footer', UI.app_footer);
}

async function loadSchema(lang, first) {
  const r = await fetch('/api/schema?lang=' + encodeURIComponent(lang || ''));
  const data = await r.json();
  LANG = data.lang; UI = data.ui; SCHEMA = data.questions;
  applyUI();
  buildLangSelect(data.languages);
  buildForm();
  if (first) { show('home'); initScroll(); }
  else { show(curStep); if (window.ScrollTrigger) requestAnimationFrame(() => ScrollTrigger.refresh()); }
}

function buildLangSelect(languages) {
  const sel = $('#lang');
  sel.innerHTML = Object.entries(languages)
    .map(([code, name]) => `<option value="${code}" ${code===LANG?'selected':''}>${name}</option>`).join('');
  sel.onchange = () => loadSchema(sel.value, false);
}

function buildForm() {
  const form = $('#brief-form');
  form.innerHTML = '';
  for (const k of Object.keys(multi)) delete multi[k];
  for (const q of SCHEMA) {
    const wrap = document.createElement('div');
    const opt = q.required ? '' : ` <span class="hint">(${UI.optional})</span>`;
    const lbl = `<label>${q.label}${opt}</label>`;
    if (q.type === 'text') {
      wrap.innerHTML = lbl + `<input type="text" id="f_${q.id}" placeholder="${q.placeholder||''}" value="${q.default||''}">`;
    } else if (q.type === 'textarea') {
      wrap.innerHTML = lbl + `<textarea id="f_${q.id}" placeholder="${q.placeholder||''}">${q.default||''}</textarea>`;
    } else if (q.type === 'color') {
      wrap.innerHTML = lbl + `<input type="color" id="f_${q.id}" value="${q.default||'#0071e3'}">`;
    } else if (q.type === 'select') {
      const opts = q.options.map(o => `<option value="${o.value}" ${o.value===q.default?'selected':''}>${o.label}</option>`).join('');
      wrap.innerHTML = lbl + `<select id="f_${q.id}">${opts}</select>`;
    } else if (q.type === 'multiselect') {
      const def = new Set(q.default || []);
      multi[q.id] = def;
      const chips = q.options.map(o =>
        `<span class="chip ${def.has(o.value)?'on':''}" data-q="${q.id}" data-o="${o.value}">${o.label}</span>`).join('');
      wrap.innerHTML = lbl + `<div class="chips">${chips}</div>`;
    }
    form.appendChild(wrap);
  }
  form.querySelectorAll('.chip').forEach(c => c.onclick = () => {
    const set = multi[c.dataset.q];
    if (set.has(c.dataset.o)) set.delete(c.dataset.o); else set.add(c.dataset.o);
    c.classList.toggle('on');
  });
}

function collect() {
  const a = { lang: LANG };
  for (const q of SCHEMA) {
    if (q.type === 'multiselect') a[q.id] = [...multi[q.id]];
    else {
      const el = $('#f_' + q.id);
      a[q.id] = el ? el.value : '';
      if (q.type === 'color' && a[q.id] === '#0071e3') a[q.id] = '';
    }
  }
  return a;
}

function briefMissing() {
  const missing = [];
  for (const q of SCHEMA) {
    if (!q.required) continue;
    if (q.type === 'multiselect') { if (!multi[q.id] || multi[q.id].size === 0) missing.push(q.label); }
    else { const el = $('#f_' + q.id); if (!el || !el.value.trim()) missing.push(q.label); }
  }
  return missing;
}

function goContact() {
  const missing = briefMissing();
  if (missing.length) {
    const prefix = LANG === 'de' ? 'Bitte ausfüllen: ' : 'Please fill in: ';
    $('#form-err').textContent = prefix + missing.join(', ');
    return;
  }
  $('#form-err').textContent = '';
  show('contact');
}

async function submit() {
  $('#contact-err').textContent = '';
  const contact = {
    name: $('#c_name').value, email: $('#c_email').value,
    phone: $('#c_phone').value, message: $('#c_message').value,
  };
  $('#submit').disabled = true;
  let data = {};
  try {
    const r = await fetch('/api/submit', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ answers: collect(), contact }),
    });
    data = await r.json();
    $('#submit').disabled = false;
    if (!r.ok) { $('#contact-err').textContent = data.error || UI.err_generic; return; }
  } catch (e) {
    $('#submit').disabled = false;
    $('#contact-err').textContent = UI.err_generic; return;
  }
  show('done');
}

function restart() {
  buildForm();
  $('#c_name').value = $('#c_email').value = $('#c_phone').value = $('#c_message').value = '';
  $('#form-err').textContent = $('#contact-err').textContent = '';
  show('brief');
}

// ---- Scrollytelling (GSAP + ScrollTrigger + Lenis). All optional/enhancement. ----
function initScroll() {
  if (scrollReady) return;
  scrollReady = true;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!window.gsap || !window.ScrollTrigger || reduce) return;   // graceful: content stays visible
  gsap.registerPlugin(ScrollTrigger);

  // Lenis smooth scroll, wired into GSAP's ticker + ScrollTrigger.
  if (window.Lenis) {
    lenis = new Lenis({ duration: 1.05, easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)) });
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add((time) => lenis.raf(time * 1000));
    gsap.ticker.lagSmoothing(0);
  }

  const ease = 'power3.out';

  // Hero: scale up + fade + blur as it leaves.
  gsap.to('.hero-inner', {
    scrollTrigger: { trigger: '.lp-hero', start: 'top top', end: 'bottom top', scrub: true },
    scale: 1.18, opacity: 0, filter: 'blur(10px)', ease: 'none',
  });
  gsap.to('.scroll-cue', {
    scrollTrigger: { trigger: '.lp-hero', start: 'top top', end: '30% top', scrub: true }, opacity: 0,
  });
  // Parallax depth — the orbs drift at different speeds as the hero scrolls away.
  const heroST = { trigger: '.lp-hero', start: 'top top', end: 'bottom top', scrub: true };
  gsap.to('.orb.a', { yPercent: 26, ease: 'none', scrollTrigger: heroST });
  gsap.to('.orb.b', { yPercent: -20, ease: 'none', scrollTrigger: heroST });
  gsap.to('.orb.c', { yPercent: 34, ease: 'none', scrollTrigger: heroST });

  // Stats: staggered rise + de-blur.
  gsap.from('.stat', {
    scrollTrigger: { trigger: '.lp-stats', start: 'top 78%' },
    y: 48, opacity: 0, filter: 'blur(8px)', stagger: 0.12, duration: 0.9, ease,
  });

  // Showcase: cards rise + de-blur in a simple stagger as they enter (no scroll-jacking).
  gsap.from('.sc-card', {
    scrollTrigger: { trigger: '.lp-showcase', start: 'top 70%' },
    y: 40, opacity: 0, filter: 'blur(6px)', stagger: 0.12, duration: 0.8, ease,
  });

  // Closing CTA: assembles from its parts.
  gsap.from('.lp-cta > *', {
    scrollTrigger: { trigger: '.lp-cta', start: 'top 75%' },
    y: 40, opacity: 0, filter: 'blur(6px)', stagger: 0.14, duration: 0.9, ease,
  });

  ScrollTrigger.refresh();
}

$('#logo').onclick = () => show('home');
$('#nav-cta').onclick = () => show('brief');
$('#home-cta').onclick = () => show('brief');
$('#home-cta-2').onclick = () => show('brief');
const scrollToStats = () => {
  const t = document.querySelector('.lp-stats');
  if (lenis) lenis.scrollTo(t); else t.scrollIntoView({ behavior: 'smooth' });
};
$('#see-how').onclick = scrollToStats;
$('#scroll-cue-btn').onclick = scrollToStats;
$('#brief-back').onclick = () => show('home');
$('#to-contact').onclick = goContact;
$('#contact-back').onclick = () => show('brief');
$('#submit').onclick = submit;
$('#restart').onclick = restart;
loadSchema(navigator.language || 'en', true);
</script>
