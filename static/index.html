<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>webgen — professional websites from your brief</title>
<style>
  :root {
    --accent:#4f46e5; --accent-dark:#4338ca; --accent-soft:#eef2ff;
    --ink:#0f172a; --body:#334155; --muted:#64748b; --line:#e5e7eb;
    --bg:#f7f8fa; --card:#ffffff;
    --shadow:0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.06);
    --radius:16px;
  }
  * { box-sizing:border-box; }
  body { margin:0; color:var(--body); background:var(--bg);
         font:16px/1.65 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         -webkit-font-smoothing:antialiased; }
  h1,h2,h3 { color:var(--ink); line-height:1.2; }
  .wrap { max-width:1040px; margin:0 auto; padding:0 24px; }

  /* top bar */
  .topbar { background:rgba(255,255,255,.85); backdrop-filter:blur(10px);
            border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20; }
  .topbar .wrap { display:flex; align-items:center; justify-content:space-between;
                  height:64px; }
  .logo { display:flex; align-items:center; gap:10px; font-weight:700; color:var(--ink);
          font-size:18px; letter-spacing:-.01em; cursor:pointer; }
  .logo .mark { width:28px; height:28px; border-radius:8px;
                background:linear-gradient(135deg,var(--accent),#8b5cf6);
                box-shadow:0 2px 8px rgba(79,70,229,.4); }
  .langbox { font-size:14px; color:var(--muted); display:flex; align-items:center; gap:8px; }
  .langbox select { font:inherit; padding:7px 10px; border:1px solid var(--line);
                    border-radius:9px; background:#fff; color:var(--ink); cursor:pointer; }

  /* hero (homepage) */
  .hero { text-align:center; padding:72px 24px 8px; }
  .hero h1 { font-size:44px; letter-spacing:-.02em; margin:0 auto; max-width:18ch; }
  .hero p { color:var(--muted); font-size:19px; max-width:58ch; margin:18px auto 0; }
  .hero .btn { margin-top:30px; }

  /* how it works */
  .how { max-width:1040px; margin:64px auto 0; padding:0 24px; }
  .how h2 { text-align:center; font-size:26px; letter-spacing:-.01em; margin:0 0 6px; }
  .how-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:30px; }
  .how-card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
              padding:26px 24px; box-shadow:var(--shadow); }
  .how-card .num { width:34px; height:34px; border-radius:10px; display:grid; place-items:center;
                   font-weight:700; color:var(--accent); background:var(--accent-soft);
                   margin-bottom:14px; }
  .how-card h3 { margin:0 0 6px; font-size:17px; }
  .how-card p { margin:0; color:var(--muted); font-size:14.5px; }

  /* stepper */
  .stepper { display:flex; align-items:center; justify-content:center; gap:8px;
             margin:40px auto 30px; flex-wrap:wrap; }
  .stepper.hidden { display:none; }
  .stepper .s { display:flex; align-items:center; gap:9px; color:var(--muted);
                font-size:14px; font-weight:600; }
  .stepper .n { width:26px; height:26px; border-radius:50%; border:2px solid var(--line);
                display:grid; place-items:center; font-size:13px; background:#fff; }
  .stepper .s.active { color:var(--ink); }
  .stepper .s.active .n { border-color:var(--accent); color:var(--accent);
                          background:var(--accent-soft); }
  .stepper .s.done .n { background:var(--accent); border-color:var(--accent); color:#fff; }
  .stepper .bar { width:34px; height:2px; background:var(--line); }

  main { padding:0 24px 72px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
          padding:32px; margin:0 auto; max-width:680px; box-shadow:var(--shadow); }
  .card > h2 { font-size:22px; margin:0; letter-spacing:-.01em; }
  .card > .sub { color:var(--muted); margin-top:6px; font-size:15px; }

  label { display:block; font-weight:600; color:var(--ink); margin:22px 0 7px; font-size:15px; }
  .hint { font-weight:400; color:var(--muted); font-size:13px; }
  input[type=text], input[type=email], input[type=tel], select, textarea {
    width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:11px;
    font:inherit; background:#fff; color:var(--ink); transition:border-color .15s, box-shadow .15s; }
  input:focus, select:focus, textarea:focus { outline:none;
    border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); }
  input[type=color] { width:54px; height:40px; padding:3px; border:1px solid var(--line);
    border-radius:10px; background:#fff; cursor:pointer; }
  textarea { resize:vertical; min-height:86px; }
  .chips { display:flex; flex-wrap:wrap; gap:9px; margin-top:7px; }
  .chip { padding:9px 15px; border:1px solid var(--line); border-radius:999px; cursor:pointer;
          user-select:none; background:#fff; font-size:14px; transition:all .12s; }
  .chip:hover { border-color:#cbd5e1; }
  .chip.on { background:var(--accent); color:#fff; border-color:var(--accent); }

  .btn { background:var(--accent); color:#fff; border:none; border-radius:11px;
         padding:14px 26px; font:inherit; font-weight:600; cursor:pointer;
         box-shadow:0 2px 8px rgba(79,70,229,.25); transition:background .15s, transform .05s; }
  .btn:hover { background:var(--accent-dark); }
  .btn:active { transform:translateY(1px); }
  .btn:disabled { opacity:.55; cursor:default; box-shadow:none; }
  .btn.ghost { background:#fff; color:var(--ink); border:1px solid var(--line); box-shadow:none; }
  .btn.ghost:hover { background:#f8fafc; border-color:#cbd5e1; }
  .actions { display:flex; gap:12px; margin-top:28px; align-items:center; }
  .actions .btn { margin-top:0; }
  .spacer { flex:1; }
  .err { color:#b91c1c; margin-top:14px; font-size:14px; }

  /* thank-you */
  .done-card { text-align:center; }
  .done-card .check { width:64px; height:64px; border-radius:50%; margin:4px auto 18px;
                      background:var(--accent-soft); display:grid; place-items:center; }
  .done-card .check::after { content:""; width:18px; height:30px; border:solid var(--accent);
                      border-width:0 4px 4px 0; transform:rotate(45deg); margin-top:-6px; }
  .done-card h2 { font-size:24px; }

  footer.app { text-align:center; color:var(--muted); font-size:13px; padding:28px 24px 40px;
               border-top:1px solid var(--line); }

  .step { display:none; }
  .step.on { display:block; }
  @media (max-width:720px) { .how-grid { grid-template-columns:1fr; } }
  @media (max-width:560px) { .hero h1 { font-size:32px; } .stepper .bar { width:18px; } }
</style>
</head>
<body>
<div class="topbar"><div class="wrap">
  <div class="logo" id="logo"><span class="mark"></span>webgen</div>
  <div class="langbox"><span id="lang-label"></span><select id="lang"></select></div>
</div></div>

<div class="stepper hidden" id="stepper">
  <div class="s" data-step="1"><span class="n">1</span><span id="step-brief"></span></div>
  <div class="bar"></div>
  <div class="s" data-step="2"><span class="n">2</span><span id="step-contact"></span></div>
  <div class="bar"></div>
  <div class="s" data-step="3"><span class="n">3</span><span id="step-done"></span></div>
</div>

<main>
  <!-- Homepage -->
  <section id="home-step" class="step on">
    <section class="hero">
      <h1 id="hero-title"></h1>
      <p id="app-sub"></p>
      <button class="btn" id="home-cta"></button>
    </section>
    <section class="how">
      <h2 id="how-title"></h2>
      <div class="how-grid">
        <div class="how-card"><div class="num">1</div><h3 id="how-1-t"></h3><p id="how-1-d"></p></div>
        <div class="how-card"><div class="num">2</div><h3 id="how-2-t"></h3><p id="how-2-d"></p></div>
        <div class="how-card"><div class="num">3</div><h3 id="how-3-t"></h3><p id="how-3-d"></p></div>
      </div>
    </section>
  </section>

  <!-- Brief -->
  <section id="form-step" class="step">
    <div class="card">
      <h2 id="form-title"></h2>
      <div class="sub" id="form-sub"></div>
      <form id="brief-form"></form>
      <div class="err" id="form-err"></div>
      <div class="actions">
        <button class="btn ghost" id="brief-back"></button>
        <span class="spacer"></span>
        <button class="btn" id="to-contact"></button>
      </div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact-step" class="step">
    <div class="card">
      <h2 id="contact-title"></h2>
      <div class="sub" id="contact-sub"></div>
      <form id="contact-form">
        <label id="l-cname"></label>
        <input type="text" id="c_name" autocomplete="name">
        <label id="l-cemail"></label>
        <input type="email" id="c_email" autocomplete="email">
        <label id="l-cphone"></label>
        <input type="tel" id="c_phone" autocomplete="tel">
        <label id="l-cmsg"></label>
        <textarea id="c_message"></textarea>
      </form>
      <div class="err" id="contact-err"></div>
      <div class="actions">
        <button class="btn ghost" id="contact-back"></button>
        <span class="spacer"></span>
        <button class="btn" id="submit"></button>
      </div>
    </div>
  </section>

  <!-- Thank you -->
  <section id="done-step" class="step">
    <div class="card done-card">
      <div class="check"></div>
      <h2 id="thanks-title"></h2>
      <div class="sub" id="thanks-sub"></div>
      <div class="actions" style="justify-content:center;">
        <button class="btn ghost" id="restart"></button>
      </div>
    </div>
  </section>
</main>

<footer class="app" id="app-footer"></footer>

<script>
const $ = (s) => document.querySelector(s);
let SCHEMA = [], UI = {}, LANG = 'en';
const multi = {};
let curStep = 'home';

const STEP_NO = { home: 0, brief: 1, contact: 2, done: 3 };

function show(name) {
  curStep = name;
  document.querySelectorAll('.step').forEach(e => e.classList.remove('on'));
  $('#' + name + '-step').classList.add('on');
  const n = STEP_NO[name];
  const stepper = $('#stepper');
  stepper.classList.toggle('hidden', n === 0);
  document.querySelectorAll('.stepper .s').forEach(s => {
    const step = +s.dataset.step;
    s.classList.toggle('active', step === n);
    s.classList.toggle('done', step < n || name === 'done');
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyUI() {
  document.documentElement.lang = LANG;
  // homepage
  $('#hero-title').textContent = UI.hero_title;
  $('#app-sub').textContent = UI.app_sub;
  $('#home-cta').textContent = UI.home_cta;
  $('#how-title').textContent = UI.how_title;
  $('#how-1-t').textContent = UI.how_1_t; $('#how-1-d').textContent = UI.how_1_d;
  $('#how-2-t').textContent = UI.how_2_t; $('#how-2-d').textContent = UI.how_2_d;
  $('#how-3-t').textContent = UI.how_3_t; $('#how-3-d').textContent = UI.how_3_d;
  // stepper
  $('#step-brief').textContent = UI.step_brief;
  $('#step-contact').textContent = UI.step_contact;
  $('#step-done').textContent = UI.step_done;
  // brief
  $('#form-title').textContent = UI.form_title;
  $('#form-sub').textContent = UI.form_sub;
  $('#brief-back').textContent = UI.back_btn;
  $('#to-contact').textContent = UI.continue_btn;
  // contact
  $('#contact-title').textContent = UI.contact_title;
  $('#contact-sub').textContent = UI.contact_sub;
  $('#l-cname').textContent = UI.contact_name;
  $('#l-cemail').textContent = UI.contact_email;
  $('#l-cphone').innerHTML = UI.contact_phone + ` <span class="hint">(${UI.optional})</span>`;
  $('#l-cmsg').innerHTML = UI.contact_message + ` <span class="hint">(${UI.optional})</span>`;
  $('#c_name').placeholder = UI.contact_name_ph;
  $('#c_email').placeholder = UI.contact_email_ph;
  $('#c_phone').placeholder = UI.contact_phone_ph;
  $('#c_message').placeholder = UI.contact_message_ph;
  $('#contact-back').textContent = UI.back_btn;
  $('#submit').textContent = UI.submit_btn;
  // thank-you
  $('#thanks-title').textContent = UI.thanks_title;
  $('#thanks-sub').textContent = UI.thanks_sub;
  $('#restart').textContent = UI.thanks_back;
  // chrome
  $('#lang-label').textContent = UI.lang_label;
  $('#app-footer').textContent = UI.app_footer;
}

async function loadSchema(lang, first) {
  const r = await fetch('/api/schema?lang=' + encodeURIComponent(lang || ''));
  const data = await r.json();
  LANG = data.lang; UI = data.ui; SCHEMA = data.questions;
  applyUI();
  buildLangSelect(data.languages);
  buildForm();
  if (first) show('home'); else show(curStep);
}

function buildLangSelect(languages) {
  const sel = $('#lang');
  sel.innerHTML = Object.entries(languages)
    .map(([code, name]) => `<option value="${code}" ${code===LANG?'selected':''}>${name}</option>`).join('');
  sel.onchange = () => loadSchema(sel.value, false);
}

function buildForm() {
  const form = $('#brief-form');
  form.innerHTML = '';
  for (const k of Object.keys(multi)) delete multi[k];
  for (const q of SCHEMA) {
    const wrap = document.createElement('div');
    const opt = q.required ? '' : ` <span class="hint">(${UI.optional})</span>`;
    const lbl = `<label>${q.label}${opt}</label>`;
    if (q.type === 'text') {
      wrap.innerHTML = lbl + `<input type="text" id="f_${q.id}" placeholder="${q.placeholder||''}" value="${q.default||''}">`;
    } else if (q.type === 'textarea') {
      wrap.innerHTML = lbl + `<textarea id="f_${q.id}" placeholder="${q.placeholder||''}">${q.default||''}</textarea>`;
    } else if (q.type === 'color') {
      wrap.innerHTML = lbl + `<input type="color" id="f_${q.id}" value="${q.default||'#4f46e5'}">`;
    } else if (q.type === 'select') {
      const opts = q.options.map(o => `<option value="${o.value}" ${o.value===q.default?'selected':''}>${o.label}</option>`).join('');
      wrap.innerHTML = lbl + `<select id="f_${q.id}">${opts}</select>`;
    } else if (q.type === 'multiselect') {
      const def = new Set(q.default || []);
      multi[q.id] = def;
      const chips = q.options.map(o =>
        `<span class="chip ${def.has(o.value)?'on':''}" data-q="${q.id}" data-o="${o.value}">${o.label}</span>`).join('');
      wrap.innerHTML = lbl + `<div class="chips">${chips}</div>`;
    }
    form.appendChild(wrap);
  }
  form.querySelectorAll('.chip').forEach(c => c.onclick = () => {
    const set = multi[c.dataset.q];
    if (set.has(c.dataset.o)) set.delete(c.dataset.o); else set.add(c.dataset.o);
    c.classList.toggle('on');
  });
}

function collect() {
  const a = { lang: LANG };
  for (const q of SCHEMA) {
    if (q.type === 'multiselect') a[q.id] = [...multi[q.id]];
    else {
      const el = $('#f_' + q.id);
      a[q.id] = el ? el.value : '';
      if (q.type === 'color' && a[q.id] === '#4f46e5') a[q.id] = '';
    }
  }
  return a;
}

// Client-side check of required brief fields before moving on.
function briefMissing() {
  const missing = [];
  for (const q of SCHEMA) {
    if (!q.required) continue;
    if (q.type === 'multiselect') { if (!multi[q.id] || multi[q.id].size === 0) missing.push(q.label); }
    else { const el = $('#f_' + q.id); if (!el || !el.value.trim()) missing.push(q.label); }
  }
  return missing;
}

function goContact() {
  const missing = briefMissing();
  if (missing.length) {
    const prefix = LANG === 'de' ? 'Bitte ausfüllen: ' : 'Please fill in: ';
    $('#form-err').textContent = prefix + missing.join(', ');
    return;
  }
  $('#form-err').textContent = '';
  show('contact');
}

async function submit() {
  $('#contact-err').textContent = '';
  const contact = {
    name: $('#c_name').value, email: $('#c_email').value,
    phone: $('#c_phone').value, message: $('#c_message').value,
  };
  $('#submit').disabled = true;
  let data = {};
  try {
    const r = await fetch('/api/submit', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ answers: collect(), contact }),
    });
    data = await r.json();
    $('#submit').disabled = false;
    if (!r.ok) { $('#contact-err').textContent = data.error || UI.err_generic; return; }
  } catch (e) {
    $('#submit').disabled = false;
    $('#contact-err').textContent = UI.err_generic; return;
  }
  show('done');
}

function restart() {
  buildForm();
  $('#c_name').value = $('#c_email').value = $('#c_phone').value = $('#c_message').value = '';
  $('#form-err').textContent = $('#contact-err').textContent = '';
  show('brief');
}

$('#logo').onclick = () => show('home');
$('#home-cta').onclick = () => show('brief');
$('#brief-back').onclick = () => show('home');
$('#to-contact').onclick = goContact;
$('#contact-back').onclick = () => show('brief');
$('#submit').onclick = submit;
$('#restart').onclick = restart;
loadSchema(navigator.language || 'en', true);
</script>
</body>
</html>
